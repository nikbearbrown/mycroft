<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03">
<title id="fig-title-03">Prior-year actual versus submitted request by budget category, with an attention threshold</title>
<desc>A grouped horizontal bar chart with a zero baseline. Three categories: headcount, software renewals, and a new-initiative line. Each shows a prior-year actual bar and a submitted-request bar. Headcount exceeds the attention threshold reference line; the new-initiative line has no prior-year counterpart, marking new spend.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Mycroft" book-slug="mycroft" chapter="10-budget-request-normalizer-and-challenge-pack" figure-number="03" figure-title="Prior-Period Change Table" figure-slug="prior-period-change-table" figure-type="statistical/quantitative" priority="Important" author="Nik Bear Brown" date-generated="2026-06-15" source-file="pantry/10-budget-request-normalizer-and-challenge-pack-cajal.md"/></metadata>
