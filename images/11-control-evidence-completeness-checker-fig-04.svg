<title id="fig-title-04">Readiness vs. Reliability: The Recipe Boundary</title>
<desc>A vertical gate divides evidence readiness, the structural checks the recipe can run, from evidence reliability, the judgment only a human can supply. The recipe stops at the gate.</desc>
