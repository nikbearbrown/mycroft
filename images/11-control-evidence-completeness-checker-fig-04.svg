<text x="60" y="82" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">what the recipe can check</text>

<!-- right panel header -->
<text x="400" y="66" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="bold">Evidence reliability</text>
<text x="400" y="82" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">what only a human can judge</text>

