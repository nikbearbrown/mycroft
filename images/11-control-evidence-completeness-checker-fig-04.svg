<text x="390" y="280" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Design adequate for the assertion</text>

<text x="32" y="395" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Readiness is mechanical and checkable. Reliability is judgment, and it stays with the professional.</text>
