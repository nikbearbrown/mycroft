<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-04">
<title id="fig-title-04">Exception Review Pack: Two-Section Structure</title>
<desc>The review pack opens with a source-chain summary header, then keeps two sections strictly separate: factual mismatches with their correction fields, and accounting-policy questions with their analysis fields. The two sections are never interleaved.</desc>
