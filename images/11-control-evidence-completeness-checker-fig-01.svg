<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01">
<title id="fig-title-01">Control Claim Decomposition</title>
<desc>A central control claim that a risk was mitigated rests on four supporting elements — period, population, people, and process — each of which the evidence must establish or the claim is unsupported.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Mycroft" book-slug="mycroft" chapter="11-control-evidence-completeness-checker" figure-number="01" figure-title="Control Claim Decomposition" figure-slug="control-claim-decomposition" figure-type="hierarchy/taxonomy" priority="Critical" author="Nik Bear Brown" date-generated="2026-06-15" source-file="pantry/11-control-evidence-completeness-checker-cajal.md"/></metadata>
<defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker></defs>

<text x="32" y="30" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">The control claim rests on four conditional elements</text>

<!-- central claim -->
<rect x="270" y="70" width="160" height="56" fill="#C8102E" stroke="#C8102E" stroke-width="1"/>
<text x="350" y="93" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Control claim</text>
<text x="350" y="110" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#FFFFFF">risk was mitigated</text>

<!-- branch lines to four elements -->
<line x1="350" y1="126" x2="130" y2="200" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="350" y1="126" x2="277" y2="200" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="350" y1="126" x2="423" y2="200" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="350" y1="126" x2="570" y2="200" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- element nodes -->
<rect x="50" y="205" width="150" height="56" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
<text x="125" y="228" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="bold">Period</text>
<text x="125" y="245" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">timestamps within</text>
<text x="125" y="257" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">review window</text>

<rect x="217" y="205" width="150" height="56" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
<text x="292" y="228" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="bold">Population</text>
<text x="292" y="245" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">sample represents</text>
<text x="292" y="257" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">full transaction set</text>

<rect x="384" y="205" width="150" height="56" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
<text x="459" y="228" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="bold">People</text>
<text x="459" y="245" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">preparer + reviewer</text>
<text x="459" y="257" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">authorized</text>

<rect x="500" y="205" width="150" height="56" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1" transform="translate(0,0)"/>
<text x="575" y="228" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="bold">Process</text>
<text x="575" y="245" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">required steps</text>
<text x="575" y="257" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">documented, traceable</text>

