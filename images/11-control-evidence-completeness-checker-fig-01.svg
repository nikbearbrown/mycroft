<line x1="575" y1="261" x2="575" y2="300" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="65" y="305" width="120" height="36" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
<text x="125" y="320" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#2a1a0e">evidence must</text>
<text x="125" y="333" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#2a1a0e">establish, or unsupported</text>

<rect x="232" y="305" width="120" height="36" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
<text x="292" y="320" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#2a1a0e">evidence must</text>
<text x="292" y="333" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#2a1a0e">establish, or unsupported</text>

<rect x="399" y="305" width="120" height="36" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
<text x="459" y="320" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#2a1a0e">evidence must</text>
<text x="459" y="333" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#2a1a0e">establish, or unsupported</text>

<rect x="515" y="305" width="120" height="36" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
<text x="575" y="320" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#2a1a0e">evidence must</text>
<text x="575" y="333" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#2a1a0e">establish, or unsupported</text>

<text x="32" y="385" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">If any one element fails, the claim that the risk was mitigated is unsupported.</text>
