<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03">
<title id="fig-title-03">Four-State Driver Classification</title>
<desc>A single category variance branches into four mutually exclusive states — fully explained, partially explained, timing-verify, and unexplained. The timing-verify and unexplained states require human review before resolution.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Mycroft" book-slug="mycroft" chapter="13-cash-forecast-variance-explainer" figure-number="03" figure-title="Four-State Driver Classification" figure-slug="four-state-driver-classification" figure-type="process flowchart" priority="Critical" author="Nik Bear Brown" date-generated="2026-06-15" source-file="pantry/13-cash-forecast-variance-explainer-cajal.md"/></metadata>
