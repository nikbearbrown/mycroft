<title id="fig-title-04">Unexplained Variance Escalation Record</title>
<desc>The escalation record is a structured template: identifying fields, a search log documenting which sources were checked, the residual after any driver was attached, and an escalation status that hands the gap to a controller or CFO.</desc>
