<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01">
<title id="fig-title-01">The Seven Phase Gates</title>
<desc>Seven gates must pass in strict order before a fully automated pipeline runs — problem, local evidence, stored script, small run, verification, review, and logging. A failed gate halts and does not advance; only after the seventh is the automated pipeline reachable.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Mycroft" book-slug="mycroft" chapter="98-appendix-best-practices" figure-number="01" figure-title="The Seven Phase Gates" figure-slug="seven-phase-gates" figure-type="process flowchart" priority="Important" author="Nik Bear Brown" date-generated="2026-06-15" source-file="pantry/98-appendix-best-practices-cajal.md"/></metadata>
