<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="'Inter', sans-serif">
  <title id="t">Assertion versus evidence</title>
  <desc id="d">A two-column comparison: an assertion column of unsupported claims beside an evidence column of source, period, entity, version, owner, control total, and logged transformation.</desc>
  <rect width="700" height="420" fill="#FFFFFF"/>
  <text x="40" y="40" font-size="20" font-family="'EB Garamond', Georgia, serif" fill="#2a1a0e">Assertion versus evidence</text>
  <text x="40" y="60" font-size="13" fill="#545454">The contract is what converts the left column into the right.</text>
  <!-- left -->
  <rect x="40" y="84" width="270" height="300" fill="#F5F5F5" stroke="#545454" stroke-width="1"/>
  <text x="56" y="110" font-size="13" font-weight="700" fill="#2a1a0e">ASSERTION</text>
  <g font-size="12" fill="#545454">
    <text x="56" y="142">Fluent summary</text>
    <text x="56" y="170">Model output</text>
    <text x="56" y="198">No source path</text>
    <text x="56" y="226">No version</text>
    <text x="56" y="254">No owner</text>
  </g>
  <!-- arrow -->
  <line x1="320" y1="234" x2="388" y2="234" stroke="#C8102E" stroke-width="2"/>
  <polygon points="390,234 380,229 380,239" fill="#C8102E"/>
  <text x="324" y="224" font-size="11" font-family="'JetBrains Mono', monospace" fill="#C8102E">contract</text>
  <!-- right -->
  <rect x="400" y="84" width="270" height="300" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1"/>
  <text x="416" y="110" font-size="13" font-weight="700" fill="#2a1a0e">EVIDENCE</text>
  <g font-size="12" fill="#2a1a0e">
    <text x="416" y="142">Source file</text>
    <text x="416" y="166">Period · entity</text>
    <text x="416" y="190">Version · owner</text>
    <text x="416" y="214">Control total</text>
    <text x="416" y="238">Logged transformation</text>
  </g>
  <rect x="416" y="262" width="238" height="2" fill="#C8860E"/>
  <text x="416" y="284" font-size="11" font-family="'JetBrains Mono', monospace" fill="#545454">reproducible by another person</text>
</svg>
