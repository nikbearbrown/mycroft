<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="'Inter', sans-serif">
  <title id="t">The two layers and the human gate</title>
  <desc id="d">A vertical two-layer stack with a preparation layer of five nodes below a judgment layer of four nodes, separated by a heavy human gate; AI arrows move freely in preparation and one stops at the gate.</desc>
  <rect width="700" height="420" fill="#FFFFFF"/>
  <text x="40" y="40" font-size="20" font-family="'EB Garamond', Georgia, serif" fill="#2a1a0e">The two layers and the human gate</text>
  <text x="40" y="60" font-size="13" fill="#545454">AI operates freely below the gate and stops at it.</text>
  <!-- judgment band -->
  <rect x="60" y="88" width="580" height="100" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1"/>
  <text x="76" y="110" font-size="13" font-weight="700" fill="#2a1a0e">JUDGMENT LAYER</text>
  <g font-size="11" fill="#2a1a0e">
    <rect x="76" y="122" width="120" height="44" fill="#FFFFFF" stroke="#2a1a0e"/><text x="86" y="148">Materiality</text>
    <rect x="216" y="122" width="120" height="44" fill="#FFFFFF" stroke="#2a1a0e"/><text x="226" y="142">Causal</text><text x="226" y="156">explanation</text>
    <rect x="356" y="122" width="120" height="44" fill="#FFFFFF" stroke="#2a1a0e"/><text x="366" y="142">Accounting</text><text x="366" y="156">treatment</text>
    <rect x="496" y="122" width="120" height="44" fill="#FFFFFF" stroke="#2a1a0e"/><text x="506" y="142">Release</text><text x="506" y="156">decision</text>
  </g>
  <!-- gate -->
  <rect x="60" y="198" width="580" height="14" fill="#C8102E"/>
  <text x="60" y="226" font-size="11" font-family="'JetBrains Mono', monospace" fill="#C8102E">human gate</text>
  <!-- preparation band -->
  <rect x="60" y="240" width="580" height="120" fill="#F5F5F5" stroke="#545454" stroke-width="1"/>
  <text x="76" y="262" font-size="13" font-weight="700" fill="#2a1a0e">PREPARATION LAYER</text>
  <g font-size="11" fill="#2a1a0e">
    <rect x="76"  y="278" width="100" height="50" fill="#FFFFFF" stroke="#545454"/><text x="86" y="300">Data pull</text>
    <rect x="192" y="278" width="100" height="50" fill="#FFFFFF" stroke="#545454"/><text x="202" y="300">Normalize</text>
    <rect x="308" y="278" width="100" height="50" fill="#FFFFFF" stroke="#545454"/><text x="318" y="300">Compare</text>
    <rect x="424" y="278" width="100" height="50" fill="#FFFFFF" stroke="#545454"/><text x="434" y="300">Format</text>
    <rect x="540" y="278" width="92"  height="50" fill="#FFFFFF" stroke="#545454"/><text x="550" y="294">Threshold</text><text x="550" y="308">flag</text>
  </g>
  <!-- intra-band arrows -->
  <g stroke="#545454" stroke-width="1.5" fill="#545454">
    <line x1="176" y1="303" x2="190" y2="303"/><polygon points="192,303 185,300 185,306"/>
    <line x1="292" y1="303" x2="306" y2="303"/><polygon points="308,303 301,300 301,306"/>
    <line x1="408" y1="303" x2="422" y2="303"/><polygon points="424,303 417,300 417,306"/>
    <line x1="524" y1="303" x2="538" y2="303"/><polygon points="540,303 533,300 533,306"/>
  </g>
  <!-- up arrow stopping at gate -->
  <line x1="350" y1="278" x2="350" y2="216" stroke="#2a1a0e" stroke-width="2"/>
  <line x1="330" y1="216" x2="370" y2="216" stroke="#2a1a0e" stroke-width="3"/>
  <text x="356" y="234" font-size="10" font-family="'JetBrains Mono', monospace" fill="#545454">stops here</text>
</svg>
