<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-04">
<title id="fig-title-04">Flags become sourced challenge questions, held at a planning-lead gate before any pack reaches departments</title>
<desc>Three flag types (unsupported assumption, threshold-exceeding change, new spend without rationale) flow into a generate-sourced-challenge-question node, then to a planning-lead review gate where questions may be removed, combined, or added. Only after the gate does the pack reach departments.</desc>
