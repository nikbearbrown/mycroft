<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02">
<title id="fig-title-02">Seven PBC Request Fields: Set vs. Track</title>
<desc>Seven prepared-by-client request fields, each showing who sets it and what the recipe checks. A human sets every field; the recipe only tracks and confirms. The privilege flag blocks the delivery queue until cleared.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Mycroft" book-slug="mycroft" chapter="14-pbc-request-tracker-and-audit-evidence-binder" figure-number="02" figure-title="Seven PBC Request Fields: Set vs. Track" figure-slug="seven-pbc-request-fields" figure-type="comparison panels" priority="Important" author="Nik Bear Brown" date-generated="2026-06-15" source-file="pantry/14-pbc-request-tracker-and-audit-evidence-binder-cajal.md"/></metadata>
