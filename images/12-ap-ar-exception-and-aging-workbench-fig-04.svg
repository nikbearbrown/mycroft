<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-04">
<title id="fig-title-04">The Action Boundary: Queue Prep vs. World Actions</title>
<desc>The queue is the action boundary. On the left, the recipe prepares: sort, age, flag, queue, confirm the as-of date, route exceptions. On the right, humans take the consequential world actions: communications, holds, releases, write-offs, record merges.</desc>
