<title id="fig-title-01">Subledger detail and the GL control account feed reconciliation, which splits into cleared and exception outputs</title>
<desc>On the left, an AR subledger node (invoices, payments, credits, adjustments) and a GL control-account balance node feed a central reconciliation process. It diverges into two outputs: matched items (cleared) and an exception queue (requires accountant judgment). An equivalence bracket links the subledger sum to the GL balance.</desc>
