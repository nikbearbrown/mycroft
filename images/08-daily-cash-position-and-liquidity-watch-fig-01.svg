<title id="fig-title-01">The recipe prepares and alerts but never crosses the boundary into treasury action</title>
<desc>Two equal zones split by a hard vertical boundary. Left, recipe scope: bank-feed ingestion, balance normalization, availability bucketing, threshold comparison, breach flagging, escalation alert. Right, treasury action boundary: payment initiation, account sweeps, credit-facility draws, investment placement or liquidation, wire transfers. No arrow crosses; the recipe alerts, it does not act.</desc>
