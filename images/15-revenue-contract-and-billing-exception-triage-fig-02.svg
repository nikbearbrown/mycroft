<title id="fig-title-02">Normalized Contract Data: Five Field Categories</title>
<desc>Five field categories map contract terms to billing-system fields for comparison — dates, products and services, prices, milestones, and modifications. The comparison-logic column is where a flag is raised; the milestones row is where factual mismatches and accounting questions collide.</desc>
