<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="'Inter', sans-serif">
  <title id="t">The supervision loop</title>
  <desc id="d">Three nodes — Scope, Approval, Verification — arranged in a triangular cycle with curved arrows, and a connector from Approval down to a gate glyph.</desc>
  <rect width="700" height="420" fill="#FFFFFF"/>
  <text x="40" y="40" font-size="20" font-family="'EB Garamond', Georgia, serif" fill="#2a1a0e">The supervision loop</text>
  <text x="40" y="60" font-size="13" fill="#545454">Scope, approval, verification — approval governs the gate.</text>
  <!-- nodes -->
  <circle cx="350" cy="130" r="58" fill="#F5F5F5" stroke="#545454" stroke-width="1"/>
  <text x="350" y="126" font-size="14" font-weight="700" fill="#2a1a0e" text-anchor="middle">Scope</text>
  <text x="350" y="144" font-size="10" fill="#545454" text-anchor="middle">what it may touch</text>
  <circle cx="200" cy="290" r="58" fill="#F5F5F5" stroke="#C8102E" stroke-width="2"/>
  <text x="200" y="286" font-size="14" font-weight="700" fill="#2a1a0e" text-anchor="middle">Approval</text>
  <text x="200" y="304" font-size="10" fill="#545454" text-anchor="middle">who clears the gate</text>
  <circle cx="500" cy="290" r="58" fill="#F5F5F5" stroke="#545454" stroke-width="1"/>
  <text x="500" y="286" font-size="14" font-weight="700" fill="#2a1a0e" text-anchor="middle">Verification</text>
  <text x="500" y="304" font-size="10" fill="#545454" text-anchor="middle">what's defensible</text>
  <!-- curved arrows clockwise -->
  <g fill="none" stroke="#545454" stroke-width="1.5">
    <path d="M400,168 A180,180 0 0 1 540,242"/>
    <path d="M455,330 A180,180 0 0 1 245,330"/>
    <path d="M160,242 A180,180 0 0 1 300,168"/>
  </g>
  <g fill="#545454">
    <polygon points="540,242 528,240 535,250"/>
    <polygon points="245,330 256,323 254,335"/>
    <polygon points="300,168 290,176 302,178"/>
  </g>
  <!-- connector from Approval to gate -->
  <line x1="200" y1="348" x2="200" y2="380" stroke="#C8102E" stroke-width="2"/>
  <rect x="180" y="380" width="40" height="14" fill="#C8102E"/>
  <text x="200" y="412" font-size="11" font-family="'JetBrains Mono', monospace" fill="#C8102E" text-anchor="middle">gate</text>
</svg>
