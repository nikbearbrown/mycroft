<line x1="120" y1="102" x2="146" y2="148" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- status: green milestone -->
<line x1="300" y1="115" x2="326" y2="115" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="330" y="88" width="120" height="54" fill="#FFFFFF" stroke="#C8860E" stroke-width="1.5"/>
<text x="390" y="112" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="600">Status: green</text>
<text x="390" y="130" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">tasks complete</text>

