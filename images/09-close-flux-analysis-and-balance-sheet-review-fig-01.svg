<rect x="150" y="100" width="150" height="30" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/><text x="160" y="120" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Reconciliations submitted</text>
<rect x="150" y="136" width="150" height="30" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/><text x="160" y="156" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Intercompany eliminated</text>
