<rect x="544" y="244" width="124" height="54" fill="#2a1a0e"/>
<text x="606" y="268" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#FFFFFF" font-weight="600">Controller review</text>
