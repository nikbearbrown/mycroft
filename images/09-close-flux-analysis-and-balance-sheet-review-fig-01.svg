<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01">
<title id="fig-title-01">The close workflow runs to a green status milestone, then a visible adequacy gap before the controller gate</title>
<desc>From period end, three completed close tasks (journals posted, reconciliations submitted, intercompany eliminations done) merge into a status: green milestone. The spine continues to trial balance extracted and flux analysis computed. A labeled horizontal adequacy gap separates the status milestone from the controller-review gate, which leads to sign-off and release.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Mycroft" book-slug="mycroft" chapter="09-close-flux-analysis-and-balance-sheet-review" figure-number="01" figure-title="Close Workflow: Status Line vs. Adequacy Gate" figure-slug="close-workflow-status-vs-adequacy-gate" figure-type="process flowchart" priority="Critical" author="Nik Bear Brown" date-generated="2026-06-15" source-file="pantry/09-close-flux-analysis-and-balance-sheet-review-cajal.md"/></metadata>
