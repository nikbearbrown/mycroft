<title id="fig-title-02">Humans Plus AI: Division of Labor</title>
<desc>AI helps with extraction, normalization, comparison, matching, flagging, formatting, and drafting. Humans handle materiality, interpretation, accounting treatment, cash action, control conclusions, release, and accountability — the last three being consequential world actions.</desc>
