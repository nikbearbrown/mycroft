<title id="fig-title-01">The Phase Gate Across Five Recipe Families</title>
<desc>Across five recipe families, one consistent gate separates the AI-assistance step from the accountable human step: AI computes, matches, flags, assembles, and compares — a human explains, signs off, decides, concludes, and sets policy.</desc>
