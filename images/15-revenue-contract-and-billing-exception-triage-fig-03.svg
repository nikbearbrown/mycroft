<title id="fig-title-03">Two-Bucket Exception Triage Funnel</title>
<desc>All flagged exceptions pass through one triage decision — can billing ops resolve this without an accounting interpretation? Factual mismatches route left to billing operations; accounting-policy questions route right to the accounting team for a policy memo.</desc>
