<title id="fig-title-02">The five-step cash position pipeline ends in a deliberate stop at escalation; treasury decides next</title>
<desc>Five sequential steps: validate feed freshness, normalize by account, entity and currency, bucket by availability, compare to thresholds, escalate to treasury (information only). Flag markers on steps one, two and four mark failure modes: stale feed accepted, account silently dropped, breach suppressed. The flow stops; no arrow continues into action.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Mycroft" book-slug="mycroft" chapter="08-daily-cash-position-and-liquidity-watch" figure-number="02" figure-title="The Five-Step Cash Position Pipeline" figure-slug="five-step-cash-position-pipeline" figure-type="process flowchart" priority="Critical" author="Nik Bear Brown" date-generated="2026-06-15" source-file="pantry/08-daily-cash-position-and-liquidity-watch-cajal.md"/></metadata>
