<text x="32" y="44" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">One normalized cash-position record &#8212; omit an account and it is incorrect, not partial</text>

<rect x="32" y="64" width="636" height="322" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
<text x="48" y="88" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Field</text>
<text x="320" y="88" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Validation rule</text>

<!-- 7 field rows -->
<rect x="48" y="96" width="260" height="38" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/><text x="60" y="120" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Entity</text>
<rect x="320" y="96" width="332" height="38" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/><text x="332" y="120" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">match master entity list, else flag</text>

<rect x="48" y="138" width="260" height="38" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/><text x="60" y="162" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Account</text>
<rect x="320" y="138" width="332" height="38" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/><text x="332" y="162" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">match account registry, else flag unknown</text>

<rect x="48" y="180" width="260" height="38" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/><text x="60" y="204" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Account type</text>
<rect x="320" y="180" width="332" height="38" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/><text x="332" y="204" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">classify, else flag</text>

<rect x="48" y="222" width="260" height="38" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/><text x="60" y="246" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Currency</text>
