<rect x="48" y="264" width="260" height="38" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/><text x="60" y="288" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Local balance</text>
<rect x="320" y="264" width="332" height="38" fill="#FFFFFF" stroke="#787878" stroke-width="1"/><text x="332" y="288" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">reconcile to statement</text>

<rect x="48" y="306" width="260" height="38" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/><text x="60" y="330" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Functional equivalent</text>
