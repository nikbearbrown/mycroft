<rect x="320" y="348" width="332" height="30" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/><text x="332" y="368" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">match expected window, else flag late</text>

<rect x="48" y="392" width="14" height="10" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/><text x="70" y="401" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">flag-on-failure rule</text>
