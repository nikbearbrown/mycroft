<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03">
<title id="fig-title-03">One normalized cash-position record decomposed into seven fields, each with a validation rule</title>
<desc>Seven fields under one frame form a single normalized record: entity, account, account type, currency, local balance, functional equivalent, as-of timestamp. Each field carries a validation rule; flag-on-failure rules are distinguished. A cash position that omits an account is incorrect, not partial.</desc>
