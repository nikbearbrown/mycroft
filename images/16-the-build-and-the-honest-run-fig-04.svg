<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-04">
<title id="fig-title-04">Run Completion Record: Three Sections</title>
<desc>A run completion record carries a did-not-test list, open risks, and the run certification. The first two are the truth-telling lists most runs omit. AI cannot certify the run as adequate; the certification is signed by the finance professional who cleared the final gate.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Mycroft" book-slug="mycroft" chapter="16-the-build-and-the-honest-run" figure-number="04" figure-title="Run Completion Record: Three Sections" figure-slug="run-completion-record-three-sections" figure-type="structural schematic" priority="Supplementary" author="Nik Bear Brown" date-generated="2026-06-15" source-file="pantry/16-the-build-and-the-honest-run-cajal.md"/></metadata>
