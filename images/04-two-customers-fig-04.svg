<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="'Inter', sans-serif">
  <title id="t">Three ways a recipe serves neither customer</title>
  <desc id="d">Three failure columns — written for machines, written for humans, written for the builder — all converging on a single outcome: both customers unserved.</desc>
  <rect width="700" height="420" fill="#FFFFFF"/>
  <text x="40" y="40" font-size="20" font-family="'EB Garamond', Georgia, serif" fill="#2a1a0e">Three ways a recipe serves neither</text>
  <text x="40" y="60" font-size="13" fill="#545454">All three share one cause: no second customer in mind.</text>
  <g font-size="12">
    <rect x="40"  y="90" width="195" height="150" fill="#F5F5F5" stroke="#545454"/>
    <text x="54" y="116" font-size="13" font-weight="700" fill="#2a1a0e">For machines</text>
    <text x="54" y="142" fill="#545454">Full agent contract</text>
    <text x="54" y="164" fill="#545454">No human report</text>
    <text x="54" y="186" fill="#545454">Log no reviewer reads</text>
    <rect x="252" y="90" width="196" height="150" fill="#F5F5F5" stroke="#545454"/>
    <text x="266" y="116" font-size="13" font-weight="700" fill="#2a1a0e">For humans</text>
    <text x="266" y="142" fill="#545454">Polished output</text>
    <text x="266" y="164" fill="#545454">No agent contract</text>
    <text x="266" y="186" fill="#545454">Irreproducible</text>
    <rect x="465" y="90" width="195" height="150" fill="#F5F5F5" stroke="#545454"/>
    <text x="479" y="116" font-size="13" font-weight="700" fill="#2a1a0e">For the builder</text>
    <text x="479" y="142" fill="#545454">Implicit knowledge</text>
    <text x="479" y="164" fill="#545454">Neither customer served</text>
    <text x="479" y="186" fill="#545454">when builder leaves</text>
  </g>
  <g stroke="#545454" stroke-width="1.5" fill="#545454">
    <line x1="137" y1="240" x2="320" y2="300"/>
    <line x1="350" y1="240" x2="350" y2="300"/>
    <line x1="562" y1="240" x2="380" y2="300"/>
  </g>
  <rect x="230" y="306" width="240" height="56" fill="#C8102E"/>
  <text x="350" y="340" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">Both customers unserved</text>
</svg>
