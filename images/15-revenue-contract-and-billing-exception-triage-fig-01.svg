<title id="fig-title-01">Contract Source Chain with Stop Signal</title>
<desc>A contract's authoritative documents form an ordered chain from master agreement through three amendments to the billing configuration, with a verification check under each link. A missing amendment breaks the chain and halts the run.</desc>
