<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-05">
<title id="fig-title-05">A single exception item ages across periods, its meaning changing from timing difference to escalation</title>
<desc>A left-to-right time axis with period intervals tracks one item: period one a new timing difference unreviewed; period two still open, no longer plausibly a timing difference; period three and beyond escalated, requiring controller sign-off before close. A carry-forward bracket shows open items are always carried forward, never aging out silently.</desc>
