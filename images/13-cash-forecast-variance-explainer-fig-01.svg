<title id="fig-title-01">Variance Bridge Waterfall</title>
<desc>A bridge from the opening forecast balance to the actual ending balance, stepped through six cash-flow categories. Explained variances are solid; unexplained variances are hatched, and the open gap requires treasury or FP and A review.</desc>
