<rect x="360" y="160" width="44" height="15" fill="#2a1a0e"/>
<text x="382" y="320" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">tax</text>
