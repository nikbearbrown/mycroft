<rect x="220" y="90" width="44" height="40" fill="#2a1a0e"/>
<text x="242" y="320" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">payroll</text>
