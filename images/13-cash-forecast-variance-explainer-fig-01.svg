<text x="58" y="304" text-anchor="end" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">0</text>
<text x="58" y="200" text-anchor="end" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">forecast</text>

<!-- columns: opening, collections, payroll, vendor, tax, financing, other, ending; 8 slots, x start 80, step 70, bar width 44 -->
<!-- opening forecast full bar (anchor) top of cumulative ~ y=110 -->
<rect x="80" y="110" width="44" height="190" fill="#2a1a0e"/>
<text x="102" y="320" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">opening</text>

