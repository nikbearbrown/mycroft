<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02">
<title id="fig-title-02">Scope Definition Template</title>
<desc>A scope definition filled in before a run starts: entities, period, source systems, recipes to run, stop conditions, and the did-not-test list. The did-not-test list is the most omitted but essential field; scope changes require a documented amendment.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Mycroft" book-slug="mycroft" chapter="16-the-build-and-the-honest-run" figure-number="02" figure-title="Scope Definition Template" figure-slug="scope-definition-template" figure-type="structural schematic" priority="Important" author="Nik Bear Brown" date-generated="2026-06-15" source-file="pantry/16-the-build-and-the-honest-run-cajal.md"/></metadata>
