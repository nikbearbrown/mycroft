<text x="280" y="123" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">start, end, extract timestamps</text>

<rect x="32" y="140" width="636" height="44" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="0.75"/>
<text x="42" y="160" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="bold">Source systems</text>
<text x="280" y="167" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">system, extract version, as-of date</text>

