<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-04">
<title id="fig-title-04">Binder Index with Privilege-Block on Delivery</title>
<desc>The binder index lists request IDs by row and index fields by column, with cell states for cleared, pending, and blocked. One privilege-flagged row has an empty privilege-review cell, which blocks its delivery authorization regardless of the other fields.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Mycroft" book-slug="mycroft" chapter="14-pbc-request-tracker-and-audit-evidence-binder" figure-number="04" figure-title="Binder Index with Privilege-Block on Delivery" figure-slug="binder-index-privilege-block" figure-type="structural schematic" priority="Supplementary" author="Nik Bear Brown" date-generated="2026-06-15" source-file="pantry/14-pbc-request-tracker-and-audit-evidence-binder-cajal.md"/></metadata>
<defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker></defs>

<text x="32" y="30" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">An uncleared privilege flag halts delivery on its own</text>

