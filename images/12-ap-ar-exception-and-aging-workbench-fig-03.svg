<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03">
<title id="fig-title-03">AR Exception Routing to Human-Action Queues</title>
<desc>A single aging export branches by condition into four exception queues — collections follow-up, dispute resolution, supervisor assignment, and data quality — that converge into a human-action zone. No queue flows directly to any world action.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Mycroft" book-slug="mycroft" chapter="12-ap-ar-exception-and-aging-workbench" figure-number="03" figure-title="AR Exception Routing to Human-Action Queues" figure-slug="ar-exception-routing" figure-type="process flowchart" priority="Critical" author="Nik Bear Brown" date-generated="2026-06-15" source-file="pantry/12-ap-ar-exception-and-aging-workbench-cajal.md"/></metadata>
