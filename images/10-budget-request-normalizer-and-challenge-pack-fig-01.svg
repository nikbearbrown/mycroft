<title id="fig-title-01">Six heterogeneous department submissions converge through three alignment stages into one uniform comparison surface</title>
<desc>On the left, six department submissions drawn as visibly different shapes (heterogeneous templates). They converge into a three-stage pipeline: period alignment, account alignment, currency alignment. On the right, a single uniform comparison surface, regular and consistent, contrasting with the irregular inputs.</desc>
