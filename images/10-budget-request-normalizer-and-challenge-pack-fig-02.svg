<title id="fig-title-02">Four pre-normalization verification checks; any failure blocks the submission from entering the pipeline</title>
<desc>Four rows, three zones each: template version, required fields present, period coverage match, currency declaration. Columns are the check, what it catches, and the recipe action if it fails. A blocking gate junction marks that a failed submission does not enter normalization.</desc>
