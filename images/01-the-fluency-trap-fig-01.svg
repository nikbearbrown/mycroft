<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t1 d1" font-family="'Inter', sans-serif">
  <title id="t1">Fluent output versus finished work</title>
  <desc id="d1">Two near-identical panels: the left, fluent output, shows surface layers only; the right, finished work, shows source, period, owner, and gate. An arrow crosses the gap marking what is missing.</desc>
  <rect width="700" height="420" fill="#FFFFFF"/>
  <text x="40" y="42" font-size="20" font-family="'EB Garamond', Georgia, serif" fill="#2a1a0e">Fluent output looks like finished work</text>
  <text x="40" y="64" font-size="13" fill="#545454">The trap is that the left column resembles the right.</text>
  <rect x="40" y="96" width="260" height="280" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="56" y="124" font-size="13" font-weight="700" fill="#2a1a0e">FLUENT OUTPUT</text>
  <rect x="56" y="142" width="228" height="20" fill="#FFFFFF" stroke="#545454" stroke-width="1"/>
  <rect x="56" y="170" width="228" height="20" fill="#FFFFFF" stroke="#545454" stroke-width="1"/>
  <rect x="56" y="198" width="180" height="20" fill="#FFFFFF" stroke="#545454" stroke-width="1"/>
  <text x="56" y="246" font-size="12" fill="#545454">Confident claim</text>
  <rect x="56" y="254" width="228" height="28" fill="#FFFFFF" stroke="#545454" stroke-width="1"/>
  <text x="56" y="316" font-size="12" fill="#545454">Ready-looking deck</text>
  <rect x="56" y="324" width="228" height="36" fill="#FFFFFF" stroke="#545454" stroke-width="1"/>
  <line x1="350" y1="96" x2="350" y2="376" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="400" y="96" width="260" height="280" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="416" y="124" font-size="13" font-weight="700" fill="#2a1a0e">FINISHED WORK</text>
  <rect x="416" y="142" width="228" height="28" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
  <text x="428" y="161" font-size="12" fill="#2a1a0e">Source file</text>
  <rect x="416" y="180" width="228" height="28" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
  <text x="428" y="199" font-size="12" fill="#2a1a0e">Period label</text>
  <rect x="416" y="218" width="228" height="28" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
  <text x="428" y="237" font-size="12" fill="#2a1a0e">Owner confirmation</text>
  <rect x="416" y="256" width="228" height="28" fill="#C8102E"/>
  <text x="428" y="275" font-size="12" font-weight="700" fill="#FFFFFF">Approval gate</text>
  <line x1="305" y1="236" x2="392" y2="236" stroke="#C8102E" stroke-width="2"/>
  <polygon points="392,236 382,231 382,241" fill="#C8102E"/>
  <text x="308" y="226" font-size="11" font-family="'JetBrains Mono', monospace" fill="#C8102E">what's missing</text>
</svg>
