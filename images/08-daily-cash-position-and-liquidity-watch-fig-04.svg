<title id="fig-title-04">The read-only liquidity watch in four sections, freshness first, every balance timestamped</title>
<desc>Four stacked sections top to bottom: feed status (current, late, missing) read first; cash position (entity, account, type, currency, balances, as-of, versus threshold) as the main body, each balance carrying an as-of marker; threshold alerts that are never suppressed; coverage notes (excluded and unknown accounts, missing feeds). Unknown accounts are flagged, not omitted.</desc>
