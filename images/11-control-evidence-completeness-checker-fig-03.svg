<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03">
<title id="fig-title-03">Evidence Readiness Ledger Structure</title>
<desc>The readiness ledger is a state matrix: rows are controls, columns are the eight checks plus identifying fields, and each body cell holds one of four states — pass, flag, missing, not applicable. It carries no ready column and no effectiveness conclusion.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Mycroft" book-slug="mycroft" chapter="11-control-evidence-completeness-checker" figure-number="03" figure-title="Evidence Readiness Ledger Structure" figure-slug="evidence-readiness-ledger-structure" figure-type="structural schematic" priority="Important" author="Nik Bear Brown" date-generated="2026-06-15" source-file="pantry/11-control-evidence-completeness-checker-cajal.md"/></metadata>
<defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker></defs>

<text x="32" y="30" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">The ledger records states, not a verdict</text>

