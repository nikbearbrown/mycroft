<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03">
<title id="fig-title-03">Gate Record Structure with Three Decision States</title>
<desc>A gate record captures who cleared what, when, and on what evidence. The decision can be approved, approved conditionally, or not approved; only the conditional state activates the condition, owner, and resolution-date fields. No gate clears scope beyond the artifact it reviewed.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Mycroft" book-slug="mycroft" chapter="16-the-build-and-the-honest-run" figure-number="03" figure-title="Gate Record Structure with Three Decision States" figure-slug="gate-record-three-states" figure-type="structural schematic" priority="Important" author="Nik Bear Brown" date-generated="2026-06-15" source-file="pantry/16-the-build-and-the-honest-run-cajal.md"/></metadata>
