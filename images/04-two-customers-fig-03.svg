<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="'Inter', sans-serif">
  <title id="t">Anatomy of the human report card</title>
  <desc id="d">Five stacked components of the human report card — purpose, evidence summary, caveats, decisions, gate — labeled as layers that make a run legible to a reviewer.</desc>
  <rect width="700" height="420" fill="#FFFFFF"/>
  <text x="40" y="40" font-size="20" font-family="'EB Garamond', Georgia, serif" fill="#2a1a0e">Anatomy of the human report card</text>
  <text x="40" y="60" font-size="13" fill="#545454">Five components that make the run legible to an accountable reviewer.</text>
  <g>
    <rect x="120" y="92"  width="460" height="50" fill="#F5F5F5" stroke="#2a1a0e"/><text x="140" y="123" font-size="14" font-weight="700" fill="#2a1a0e">Purpose</text><text x="320" y="123" font-size="12" fill="#545454">what was this trying to find?</text>
    <rect x="120" y="150" width="460" height="50" fill="#F5F5F5" stroke="#2a1a0e"/><text x="140" y="181" font-size="14" font-weight="700" fill="#2a1a0e">Evidence summary</text><text x="320" y="181" font-size="12" fill="#545454">what did it find?</text>
    <rect x="120" y="208" width="460" height="50" fill="#F5F5F5" stroke="#2a1a0e"/><text x="140" y="239" font-size="14" font-weight="700" fill="#2a1a0e">Caveats</text><text x="320" y="239" font-size="12" fill="#545454">what it did not check</text>
    <rect x="120" y="266" width="460" height="50" fill="#F5F5F5" stroke="#2a1a0e"/><text x="140" y="297" font-size="14" font-weight="700" fill="#2a1a0e">Decisions</text><text x="320" y="297" font-size="12" fill="#545454">what the human must do</text>
    <rect x="120" y="324" width="460" height="50" fill="#C8102E"/><text x="140" y="355" font-size="14" font-weight="700" fill="#FFFFFF">Gate</text><text x="320" y="355" font-size="12" fill="#FFFFFF">who approves, and what it means</text>
  </g>
  <line x1="92" y1="350" x2="92" y2="100" stroke="#2a1a0e" stroke-width="2"/><polygon points="92,94 87,106 97,106" fill="#2a1a0e"/>
  <text x="66" y="225" font-size="11" font-family="'JetBrains Mono', monospace" fill="#545454" transform="rotate(-90 66 225)">legibility</text>
</svg>
