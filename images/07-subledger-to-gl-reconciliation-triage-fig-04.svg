<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-04">
<title id="fig-title-04">Five mutually exclusive exception classes ordered by ascending urgency, each with its own resolution</title>
<desc>Five stacked rows ordered low to high urgency: timing difference (clears next period, no entry), mapping error (correcting journal entry), duplicate (void or reverse), missing support (control finding), unexplained (escalate to controller). A left-edge arrow marks rising urgency. Each class maps to a distinct resolution action.</desc>
