<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe scope vs. treasury action boundary</title>
<style>
  :root {
    --color-white:#FFFFFF; --color-ink:#2a1a0e; --color-red:#C8102E;
    --color-secondary:#545454; --color-border:#D4D4D4; --color-ochre:#C8860E; --color-fill:#F5F5F5;
  }
  @media (prefers-color-scheme: dark) {
    :root { --color-white:#111111; --color-ink:#F0EBE3; --color-red:#E8243A;
            --color-secondary:#A0978C; --color-border:#2E2E2E; --color-ochre:#D49A30; --color-fill:#1A1A1A; }
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--color-white); color:var(--color-ink);
         font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif; }
  #chart { width:100%; }
  .chart-title { font-size:16px; font-weight:700; fill:var(--color-ink); }
  .chart-sub { font-size:13px; fill:var(--color-secondary); }
  .col-head { font-size:13px; font-weight:700; fill:var(--color-ink); }
  .item-label { font-size:12px; fill:var(--color-ink); }
  .gate-label { font-family:'JetBrains Mono',monospace; font-size:11px; fill:var(--color-red); }
  .tooltip { position:absolute; pointer-events:none; opacity:0; background:var(--color-ink);
             color:var(--color-white); font-size:13px; padding:6px 10px; border-radius:4px; }
  @media (prefers-reduced-motion: reduce) { * { transition:none !important; animation:none !important; } }
</style>
</head>
<body>
<div id="chart" role="main"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const FALLBACK_DATA = {
  scope: ["Bank-feed ingestion","Balance normalization","Availability bucketing","Threshold comparison","Breach flagging","Escalation alert"],
  boundary: ["Payment initiation","Account sweeps","Credit facility draws","Investment placement / liquidation","Wire transfers"]
};
const tooltip = d3.select('body').append('div').attr('class','tooltip');
async function loadData() {
  try { return await d3.json('./08-daily-cash-position-and-liquidity-watch-fig-01/data.json'); }
  catch { return FALLBACK_DATA; }
}
function draw(data) {
  d3.select('#chart').selectAll('*').remove();
  const totalWidth = document.getElementById('chart').clientWidth || 800;
  const rows = Math.max(data.scope.length, data.boundary.length);
  const rowH = 42, rowPad = 8;
  const totalHeight = 96 + rows*(rowH+rowPad) + 28;
  const margin = { top: 70, right: 20, bottom: 36, left: 20 };
  const innerW = totalWidth - margin.left - margin.right;
  const gap = 44;
  const colW = (innerW - gap) / 2;

  const svg = d3.select('#chart').append('svg')
    .attr('width',totalWidth).attr('height',totalHeight)
    .attr('role','img').attr('aria-labelledby','t1 d1');
  svg.append('title').attr('id','t1').text('Recipe scope versus the treasury action boundary');
  svg.append('desc').attr('id','d1').text('Two columns divided by a hard red boundary line; the left lists what the recipe may do, the right lists treasury actions the recipe must never take.');

  svg.append('text').attr('class','chart-title').attr('x',16).attr('y',26).text('The recipe stops at the boundary');
  svg.append('text').attr('class','chart-sub').attr('x',16).attr('y',46).text('Alert, do not act — money-moving actions belong to a named treasury professional.');

  const g = svg.append('g').attr('transform',`translate(${margin.left},${margin.top})`);

  function column(items, x0, head, accent) {
    const gg = g.append('g').attr('transform',`translate(${x0},0)`);
    gg.append('text').attr('class','col-head').attr('x',colW/2).attr('y',0).attr('text-anchor','middle').text(head);
    gg.selectAll('.cell').data(items).join('rect')
      .attr('class','cell').attr('x',0).attr('y',(d,i)=>14+i*(rowH+rowPad))
      .attr('width',colW).attr('height',rowH)
      .attr('fill','var(--color-fill)')
      .attr('stroke', accent ? 'var(--color-red)' : 'var(--color-border)')
      .attr('stroke-width', accent ? 1.5 : 1)
      .attr('tabindex',0).attr('aria-label',d=>`${head}: ${d}`)
      .on('mouseover',function(event,d){
        d3.selectAll('.cell').attr('opacity',0.35); d3.select(this).attr('opacity',1);
        tooltip.html(`<strong>${head}</strong><br>${d}`)
          .style('left',(event.pageX+12)+'px').style('top',(event.pageY-28)+'px')
          .transition().duration(150).style('opacity',1);
      })
      .on('mousemove',event=>tooltip.style('left',(event.pageX+12)+'px').style('top',(event.pageY-28)+'px'))
      .on('mouseout',function(){ d3.selectAll('.cell').attr('opacity',1); tooltip.transition().duration(100).style('opacity',0); });
    gg.selectAll('.cl').data(items).join('text')
      .attr('class','item-label').attr('x',12).attr('y',(d,i)=>14+i*(rowH+rowPad)+rowH/2+4).text(d=>d);
  }
  column(data.scope, 0, 'Recipe scope', false);
  column(data.boundary, colW+gap, 'Treasury action boundary', true);

  const gateX = colW + gap/2;
  g.append('rect').attr('x',gateX-3).attr('y',-6).attr('width',6)
   .attr('height', 14 + rows*(rowH+rowPad)).attr('fill','var(--color-red)').attr('aria-hidden','true');
  g.append('text').attr('class','gate-label').attr('x',gateX).attr('text-anchor','middle')
   .attr('y', 28 + rows*(rowH+rowPad)).text('hard boundary');
}
loadData().then(data => { draw(data); new ResizeObserver(()=>draw(data)).observe(document.getElementById('chart')); });
</script>
</body>
</html>
