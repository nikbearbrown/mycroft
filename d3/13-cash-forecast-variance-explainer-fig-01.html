<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Variance bridge waterfall</title>
  <style>
    :root {
      --color-white:     #FFFFFF;
      --color-ink:       #2a1a0e;
      --color-red:       #C8102E;
      --color-secondary: #545454;
      --color-border:    #D4D4D4;
      --color-ochre:     #C8860E;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-white:     #111111;
        --color-ink:       #F0EBE3;
        --color-red:       #E8243A;
        --color-secondary: #A0978C;
        --color-border:    #2E2E2E;
        --color-ochre:     #D49A30;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--color-white); color: var(--color-ink); font-family: 'Inter', -apple-system, 'Helvetica Neue', sans-serif; }
    #chart { width: 100%; }
    .chart-title { font-size: 16px; font-weight: 700; fill: var(--color-ink); }
    .chart-subtitle { font-size: 13px; fill: var(--color-secondary); }
    .axis-tick text { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: var(--color-secondary); }
    .gridline line { stroke: var(--color-border); stroke-opacity: 0.6; }
    .bar-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: var(--color-secondary); }
    .legend-label { font-size: 12px; fill: var(--color-ink); }
    .tooltip {
      position: absolute; pointer-events: none; opacity: 0;
      background: var(--color-white); color: var(--color-ink);
      border: 1px solid var(--color-border); border-radius: 8px;
      padding: 8px 10px; font-size: 13px;
      box-shadow: 0 6px 20px -6px rgb(18 18 18 / 0.14);
    }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
  </style>
</head>
<body>
  <div id="chart" role="main"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <script>
    // type: start | end | explained | unexplained
    const FALLBACK_DATA = [
      { label: 'Opening forecast', value: 4200000, type: 'start' },
      { label: 'Collections',      value: -310000, type: 'explained' },
      { label: 'Payroll',          value: -47000,  type: 'explained' },
      { label: 'Vendor payments',  value: -183400, type: 'unexplained' },
      { label: 'Other receipts',   value: -9000,   type: 'explained' },
      { label: 'Actual ending',    value: 3650600, type: 'end' }
    ];

    const tooltip = d3.select('body').append('div').attr('class', 'tooltip');
    const fmt = d3.format('$,.0f');

    async function loadData() {
      try { return await d3.json('./13-cash-forecast-variance-explainer-fig-01/data.json'); }
      catch { return FALLBACK_DATA; }
    }

    function draw(data) {
      d3.select('#chart').selectAll('*').remove();
      const margin = { top: 70, right: 40, bottom: 70, left: 80 };
      const totalWidth = document.getElementById('chart').clientWidth || 800;
      const totalHeight = 460;
      const chartWidth = totalWidth - margin.left - margin.right;
      const chartHeight = totalHeight - margin.top - margin.bottom;

      const svg = d3.select('#chart').append('svg')
        .attr('width', totalWidth).attr('height', totalHeight)
        .attr('role', 'img').attr('aria-labelledby', 'chart-title chart-desc');
      svg.append('title').attr('id', 'chart-title').text('Variance bridge waterfall');
      svg.append('desc').attr('id', 'chart-desc')
        .text('A waterfall bridging opening forecast to actual ending balance through category variances, separating explained from unexplained movement.');

      svg.append('text').attr('class', 'chart-title').attr('x', 16).attr('y', 26)
        .text('Variance bridge waterfall');
      svg.append('text').attr('class', 'chart-subtitle').attr('x', 16).attr('y', 46)
        .text('The bridge disaggregates total variance; the unexplained portion is a finding, not a narrative.');

      const gChart = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

      // compute cumulative for floating bars
      let cum = 0;
      const bars = data.map(d => {
        if (d.type === 'start') { const b = { ...d, y0: 0, y1: d.value }; cum = d.value; return b; }
        if (d.type === 'end')   { const b = { ...d, y0: 0, y1: d.value }; return b; }
        const y0 = cum; cum += d.value; const y1 = cum;
        return { ...d, y0, y1 };
      });

      const maxV = d3.max(bars, d => Math.max(d.y0, d.y1, d.value));
      const xScaleBand = d3.scaleBand().domain(data.map(d => d.label)).range([0, chartWidth]).padding(0.3);
      const yScaleLinear = d3.scaleLinear().domain([0, maxV]).nice().range([chartHeight, 0]);

      gChart.append('g').attr('class', 'gridline').attr('aria-hidden', 'true')
        .selectAll('line').data(yScaleLinear.ticks(5)).join('line')
        .attr('x1', 0).attr('x2', chartWidth)
        .attr('y1', d => yScaleLinear(d)).attr('y2', d => yScaleLinear(d));

      const xAxis = gChart.append('g').attr('class', 'axis-tick')
        .attr('transform', `translate(0,${chartHeight})`)
        .call(d3.axisBottom(xScaleBand).tickSize(0));
      xAxis.select('.domain').attr('stroke', 'var(--color-border)');
      xAxis.selectAll('text').attr('transform', 'rotate(-18)').style('text-anchor', 'end');

      const yAxis = gChart.append('g').attr('class', 'axis-tick')
        .call(d3.axisLeft(yScaleLinear).ticks(5).tickFormat(d3.format('$,.1s')));
      yAxis.select('.domain').attr('stroke', 'var(--color-border)');

      const fill = {
        start: 'var(--color-ink)',
        end: 'var(--color-ink)',
        explained: 'var(--color-secondary)',
        unexplained: 'var(--color-red)'
      };

      gChart.selectAll('.bar').data(bars).join('rect').attr('class', 'bar')
        .attr('x', d => xScaleBand(d.label))
        .attr('y', d => yScaleLinear(Math.max(d.y0, d.y1)))
        .attr('width', xScaleBand.bandwidth())
        .attr('height', d => Math.abs(yScaleLinear(d.y0) - yScaleLinear(d.y1)) || (d.type === 'start' || d.type === 'end' ? chartHeight - yScaleLinear(d.value) : 0))
        .attr('fill', d => fill[d.type])
        .attr('tabindex', 0)
        .attr('aria-label', d => `${d.label}: ${fmt(d.value)} (${d.type})`)
        .style('cursor', 'pointer')
        .style('transition', 'opacity 120ms')
        .on('mouseover', function (event, d) {
          d3.select(this).style('opacity', 0.8);
          tooltip.html(`<strong>${d.label}</strong><br>${fmt(d.value)}<br><em>${d.type}</em>`)
            .style('left', (event.pageX + 12) + 'px').style('top', (event.pageY - 28) + 'px')
            .transition().duration(150).style('opacity', 1);
        })
        .on('mousemove', function (event) { tooltip.style('left', (event.pageX + 12) + 'px').style('top', (event.pageY - 28) + 'px'); })
        .on('mouseout', function () { d3.select(this).style('opacity', 1); tooltip.transition().duration(100).style('opacity', 0); });

      // legend
      const legend = svg.append('g').attr('transform', `translate(${margin.left},${totalHeight - 16})`);
      [['explained', 'Explained'], ['unexplained', 'Unexplained — open']].forEach((s, i) => {
        const row = legend.append('g').attr('transform', `translate(${i * 160},0)`);
        row.append('rect').attr('width', 12).attr('height', 12).attr('y', -10).attr('fill', fill[s[0]]);
        row.append('text').attr('class', 'legend-label').attr('x', 18).attr('y', 0).text(s[1]);
      });
    }

    loadData().then(data => {
      draw(data);
      const ro = new ResizeObserver(() => draw(data));
      ro.observe(document.getElementById('chart'));
    });
  </script>
</body>
</html>
