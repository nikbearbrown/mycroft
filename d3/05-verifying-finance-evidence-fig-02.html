<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Six dimensions of evidence adequacy</title>
<style>
  :root { --color-white:#FFFFFF; --color-ink:#2a1a0e; --color-red:#C8102E; --color-secondary:#545454; --color-border:#D4D4D4; --color-ochre:#C8860E; --color-fill:#F5F5F5; }
  @media (prefers-color-scheme: dark){ :root{ --color-white:#111111; --color-ink:#F0EBE3; --color-red:#E8243A; --color-secondary:#A0978C; --color-border:#2E2E2E; --color-ochre:#D49A30; --color-fill:#1A1A1A; } }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--color-white);color:var(--color-ink);font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;}
  #chart{width:100%;}
  .center{fill:var(--color-red);}
  .node{fill:var(--color-fill);stroke:var(--color-secondary);stroke-width:1;transition:opacity 120ms cubic-bezier(0.2,0.8,0.2,1);}
  .spoke{stroke:var(--color-border);stroke-width:1;}
  .heading{font-family:'EB Garamond',Georgia,serif;fill:var(--color-ink);} .sub{fill:var(--color-secondary);}
  .nlabel{fill:var(--color-ink);font-size:12px;text-anchor:middle;} .ctext{fill:var(--color-white);font-weight:700;font-size:12px;text-anchor:middle;}
  .tooltip{position:absolute;pointer-events:none;opacity:0;background:var(--color-white);color:var(--color-ink);border:1px solid var(--color-border);padding:6px 8px;font-size:13px;max-width:240px;}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important;}}
</style></head>
<body><div id="chart" role="main"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const FALLBACK_DATA=[
 {name:'Completeness',q:'What should be here, and is it?'},
 {name:'Freshness',q:'Does the timestamp match the moment?'},
 {name:'Control totals',q:'What does this reconcile to?'},
 {name:'Mapping',q:'Are the categories consistent across periods?'},
 {name:'Threshold logic',q:'Is this threshold right for this decision?'},
 {name:'Contradiction',q:'What would explain the discrepancy?'}
];
let tooltip;
function draw(data){
  d3.select('#chart').selectAll('*').remove();
  if(tooltip)tooltip.remove(); tooltip=d3.select('body').append('div').attr('class','tooltip');
  const w=document.getElementById('chart').clientWidth||700, h=Math.max(440,w*0.66);
  const svg=d3.select('#chart').append('svg').attr('width',w).attr('height',h).attr('viewBox',`0 0 ${w} ${h}`).attr('role','img').attr('aria-labelledby','t d');
  svg.append('title').attr('id','t').text('Six dimensions of evidence adequacy');
  svg.append('desc').attr('id','d').text('Six adequacy dimensions arranged around a central evidence node, each a silent failure mode.');
  svg.append('text').attr('class','heading').attr('x',24).attr('y',32).attr('font-size',20).text('Six dimensions of evidence adequacy');
  svg.append('text').attr('class','sub').attr('x',24).attr('y',52).attr('font-size',13).text('Each one fails silently — the artifact looks fine when it is broken.');
  const cx=w/2, cy=80+(h-80)/2, R=Math.min(w,h-80)*0.34, nw=140, nh=44;
  const pts=data.map((d,i)=>{const a=(-90+i*60)*Math.PI/180;return{...d,x:cx+R*Math.cos(a),y:cy+R*Math.sin(a)};});
  pts.forEach(p=>svg.append('line').attr('class','spoke').attr('x1',cx).attr('y1',cy).attr('x2',p.x).attr('y2',p.y));
  svg.append('circle').attr('class','center').attr('cx',cx).attr('cy',cy).attr('r',50);
  svg.append('text').attr('class','ctext').attr('x',cx).attr('y',cy-4).text('Evidence');
  svg.append('text').attr('class','ctext').attr('x',cx).attr('y',cy+12).text('adequacy');
  const g=svg.selectAll('.g-node').data(pts).join('g').attr('tabindex',0).attr('role','listitem').attr('aria-label',d=>d.name+': '+d.q);
  g.append('rect').attr('class','node').attr('x',d=>d.x-nw/2).attr('y',d=>d.y-nh/2).attr('width',nw).attr('height',nh);
  g.append('text').attr('class','nlabel').attr('x',d=>d.x).attr('y',d=>d.y+4).text(d=>d.name);
  g.on('mouseover',(event,d)=>tooltip.html('<strong>'+d.name+'</strong><br>'+d.q).style('opacity',1))
   .on('mousemove',event=>tooltip.style('left',(event.pageX+12)+'px').style('top',(event.pageY-28)+'px'))
   .on('mouseout',()=>tooltip.style('opacity',0))
   .on('focus',function(event,d){const rc=this.getBoundingClientRect();tooltip.html('<strong>'+d.name+'</strong><br>'+d.q).style('opacity',1).style('left',(window.scrollX+rc.left)+'px').style('top',(window.scrollY+rc.bottom+4)+'px');})
   .on('blur',()=>tooltip.style('opacity',0));
}
let current=FALLBACK_DATA;
async function load(){try{current=await d3.json('./05-verifying-finance-evidence-fig-02.json');}catch(e){current=FALLBACK_DATA;}draw(current);}
load(); new ResizeObserver(()=>draw(current)).observe(document.getElementById('chart'));
</script></body></html>
