<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The finance work stack</title>
<style>
  :root { --color-white:#FFFFFF; --color-ink:#2a1a0e; --color-red:#C8102E; --color-secondary:#545454; --color-border:#D4D4D4; --color-ochre:#C8860E; --color-fill:#F5F5F5; }
  @media (prefers-color-scheme: dark) { :root { --color-white:#111111; --color-ink:#F0EBE3; --color-red:#E8243A; --color-secondary:#A0978C; --color-border:#2E2E2E; --color-ochre:#D49A30; --color-fill:#1A1A1A; } }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--color-white); color:var(--color-ink); font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif; }
  #chart { width:100%; }
  .band { fill:var(--color-fill); stroke:var(--color-secondary); stroke-width:1; transition:opacity 120ms cubic-bezier(0.2,0.8,0.2,1); }
  .gate { fill:var(--color-red); }
  .heading { font-family:'EB Garamond',Georgia,serif; fill:var(--color-ink); }
  .sub { fill:var(--color-secondary); }
  .band-title { font-weight:700; fill:var(--color-ink); font-size:15px; }
  .band-desc { fill:var(--color-secondary); font-size:12px; }
  .mono { font-family:'JetBrains Mono','Fira Code',monospace; font-size:11px; }
  .arrow { stroke:var(--color-ink); stroke-width:2; fill:var(--color-ink); }
  @media (prefers-reduced-motion: reduce) { * { transition:none !important; animation:none !important; } }
</style>
</head>
<body>
<div id="chart" role="main"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const FALLBACK_DATA = [
  {layer:'Judgment',desc:'Meaning · materiality · cause · action — accountable human',gateAbove:true},
  {layer:'Preparation',desc:'Structuring · comparing · drafting — AI-assisted, checkable',gateAbove:false},
  {layer:'Data',desc:'Raw exports · system records — accurate and traceable',gateAbove:false}
];
function draw(data){
  d3.select('#chart').selectAll('*').remove();
  const w = document.getElementById('chart').clientWidth || 700;
  const h = Math.max(380, w*0.58);
  const svg = d3.select('#chart').append('svg').attr('width',w).attr('height',h)
    .attr('viewBox',`0 0 ${w} ${h}`).attr('role','img').attr('aria-labelledby','t d');
  svg.append('title').attr('id','t').text('The finance work stack');
  svg.append('desc').attr('id','d').text('A three-tier stack with Data at the bottom, Preparation above, Judgment on top, and a gate on the Preparation–Judgment boundary.');
  svg.append('text').attr('class','heading').attr('x',24).attr('y',32).attr('font-size',20).text('The finance work stack');
  svg.append('text').attr('class','sub').attr('x',24).attr('y',52).attr('font-size',13).text('The fluency trap lives on the gate between preparation and judgment.');

  const left=120, bw=w-left-40, top=80, gap=8, gateH=10, bandH=(h-top-40-gateH-gap*2)/3;
  let y=top;
  data.forEach((d,i)=>{
    if(d.gateAbove){}
    svg.append('rect').attr('class','band').attr('x',left).attr('y',y).attr('width',bw).attr('height',bandH);
    svg.append('text').attr('class','band-title').attr('x',left+18).attr('y',y+30).text(d.layer);
    svg.append('text').attr('class','band-desc').attr('x',left+18).attr('y',y+52).text(d.desc);
    y+=bandH+gap;
    if(i===0){ // gate after Judgment? no — gate between prep & judgment, i.e., after first band
      svg.append('rect').attr('class','gate').attr('x',left).attr('y',y-gap+1).attr('width',bw).attr('height',gateH);
      svg.append('text').attr('class','mono').attr('fill','var(--color-red)').attr('x',left+bw+4).attr('y',y-gap+10).text('gate');
      y+=gateH+gap;
    }
  });
  // side arrow
  svg.append('line').attr('class','arrow').attr('x1',80).attr('y1',h-44).attr('x2',80).attr('y2',top+6);
  svg.append('polygon').attr('class','arrow').attr('points',`80,${top} 75,${top+12} 85,${top+12}`);
  svg.append('text').attr('class','mono sub').attr('fill','var(--color-secondary)')
    .attr('transform',`rotate(-90 40 ${(h+top)/2})`).attr('x',40).attr('y',(h+top)/2).attr('text-anchor','middle')
    .text('accountability up · checkability down');
}
let current=FALLBACK_DATA;
async function load(){ try{ current=await d3.json('./01-the-fluency-trap-fig-02.json'); }catch(e){ current=FALLBACK_DATA; } draw(current); }
load();
new ResizeObserver(()=>draw(current)).observe(document.getElementById('chart'));
</script>
</body>
</html>
