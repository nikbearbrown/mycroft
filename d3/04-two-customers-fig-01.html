<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The two customers</title>
<style>
  :root { --color-white:#FFFFFF; --color-ink:#2a1a0e; --color-red:#C8102E; --color-secondary:#545454; --color-border:#D4D4D4; --color-ochre:#C8860E; --color-fill:#F5F5F5; }
  @media (prefers-color-scheme: dark){ :root{ --color-white:#111111; --color-ink:#F0EBE3; --color-red:#E8243A; --color-secondary:#A0978C; --color-border:#2E2E2E; --color-ochre:#D49A30; --color-fill:#1A1A1A; } }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--color-white);color:var(--color-ink);font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;}
  #chart{width:100%;}
  .col{fill:var(--color-fill);stroke-width:1;} .col.agent{stroke:var(--color-secondary);} .col.human{stroke:var(--color-ink);}
  .row{fill:var(--color-white);stroke-width:1;} .row.agent{stroke:var(--color-secondary);} .row.human{stroke:var(--color-ink);} .row.gate{fill:var(--color-red);stroke:var(--color-red);}
  .heading{font-family:'EB Garamond',Georgia,serif;fill:var(--color-ink);} .sub{fill:var(--color-secondary);}
  .ctitle{font-weight:700;fill:var(--color-ink);font-size:13px;} .rlabel{fill:var(--color-ink);font-size:12px;} .rlabel.gate{fill:var(--color-white);font-weight:700;}
  .mono{font-family:'JetBrains Mono','Fira Code',monospace;font-size:10px;fill:var(--color-red);}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important;}}
</style></head>
<body><div id="chart" role="main"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const FALLBACK_DATA={agent:['File-path inputs','Deterministic steps','Output schema','Stop conditions','Run log'],human:['Purpose','Evidence summary','Caveats','Decisions','Gate']};
function draw(data){
  d3.select('#chart').selectAll('*').remove();
  const w=document.getElementById('chart').clientWidth||700, h=Math.max(400,w*0.6);
  const svg=d3.select('#chart').append('svg').attr('width',w).attr('height',h).attr('viewBox',`0 0 ${w} ${h}`).attr('role','img').attr('aria-labelledby','t d');
  svg.append('title').attr('id','t').text('The two customers');
  svg.append('desc').attr('id','d').text('Agent contract column beside human report card column; designing for one is not designing for both.');
  svg.append('text').attr('class','heading').attr('x',24).attr('y',32).attr('font-size',20).text('The two customers');
  svg.append('text').attr('class','sub').attr('x',24).attr('y',52).attr('font-size',13).text('The agent and the reviewer have genuinely different needs.');
  const top=78, cw=(w-48-50)/2, lx=24, rx=lx+cw+50, ch=h-top-26;
  function col(x,title,items,kind){
    svg.append('rect').attr('class','col '+kind).attr('x',x).attr('y',top).attr('width',cw).attr('height',ch);
    svg.append('text').attr('class','ctitle').attr('x',x+14).attr('y',top+24).text(title);
    const rh=(ch-40)/items.length;
    items.forEach((t,i)=>{ const isGate=kind==='human'&&i===items.length-1; const y=top+36+i*rh;
      svg.append('rect').attr('class','row '+(isGate?'gate':kind)).attr('x',x+14).attr('y',y).attr('width',cw-28).attr('height',rh-8);
      svg.append('text').attr('class','rlabel'+(isGate?' gate':'')).attr('x',x+24).attr('y',y+(rh-8)/2+4).text(t); });
  }
  col(lx,'AGENT CONTRACT',data.agent,'agent');
  col(rx,'HUMAN REPORT CARD',data.human,'human');
  svg.append('text').attr('class','mono').attr('text-anchor','middle').attr('transform',`rotate(-90 ${(lx+cw+rx)/2} ${top+ch/2})`).attr('x',(lx+cw+rx)/2).attr('y',top+ch/2).text('what most recipes skip');
}
let current=FALLBACK_DATA;
async function load(){try{current=await d3.json('./04-two-customers-fig-01.json');}catch(e){current=FALLBACK_DATA;}draw(current);}
load(); new ResizeObserver(()=>draw(current)).observe(document.getElementById('chart'));
</script></body></html>
