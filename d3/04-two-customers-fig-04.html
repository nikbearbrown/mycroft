<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three ways a recipe serves neither</title>
<style>
  :root { --color-white:#FFFFFF; --color-ink:#2a1a0e; --color-red:#C8102E; --color-secondary:#545454; --color-border:#D4D4D4; --color-ochre:#C8860E; --color-fill:#F5F5F5; }
  @media (prefers-color-scheme: dark){ :root{ --color-white:#111111; --color-ink:#F0EBE3; --color-red:#E8243A; --color-secondary:#A0978C; --color-border:#2E2E2E; --color-ochre:#D49A30; --color-fill:#1A1A1A; } }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--color-white);color:var(--color-ink);font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;}
  #chart{width:100%;}
  .col{fill:var(--color-fill);stroke:var(--color-secondary);stroke-width:1;}
  .heading{font-family:'EB Garamond',Georgia,serif;fill:var(--color-ink);} .sub{fill:var(--color-secondary);}
  .ctitle{font-weight:700;fill:var(--color-ink);font-size:13px;} .citem{fill:var(--color-secondary);font-size:12px;}
  .converge{stroke:var(--color-secondary);stroke-width:1.5;}
  .outcome{fill:var(--color-red);} .otext{fill:var(--color-white);font-weight:700;font-size:15px;text-anchor:middle;}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important;}}
</style></head>
<body><div id="chart" role="main"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const FALLBACK_DATA=[
 {title:'For machines',items:['Full agent contract','No human report','Log no reviewer reads']},
 {title:'For humans',items:['Polished output','No agent contract','Irreproducible']},
 {title:'For the builder',items:['Implicit knowledge','Neither served when','the builder leaves']}
];
function draw(data){
  d3.select('#chart').selectAll('*').remove();
  const w=document.getElementById('chart').clientWidth||700, h=Math.max(400,w*0.6);
  const svg=d3.select('#chart').append('svg').attr('width',w).attr('height',h).attr('viewBox',`0 0 ${w} ${h}`).attr('role','img').attr('aria-labelledby','t d');
  svg.append('title').attr('id','t').text('Three ways a recipe serves neither customer');
  svg.append('desc').attr('id','d').text('Three failure columns converging on a single outcome: both customers unserved.');
  svg.append('text').attr('class','heading').attr('x',24).attr('y',32).attr('font-size',20).text('Three ways a recipe serves neither');
  svg.append('text').attr('class','sub').attr('x',24).attr('y',52).attr('font-size',13).text('All three share one cause: no second customer in mind.');
  const top=78, gap=16, cw=(w-48-gap*2)/3, chh=150;
  const cx=[];
  data.forEach((d,i)=>{ const x=24+i*(cw+gap); cx.push(x+cw/2);
    svg.append('rect').attr('class','col').attr('x',x).attr('y',top).attr('width',cw).attr('height',chh);
    svg.append('text').attr('class','ctitle').attr('x',x+14).attr('y',top+26).text(d.title);
    d.items.forEach((t,j)=>svg.append('text').attr('class','citem').attr('x',x+14).attr('y',top+52+j*22).text(t)); });
  const oy=top+chh+72, ow=Math.min(280,w*0.42), ox=(w-ow)/2;
  cx.forEach(x=>svg.append('line').attr('class','converge').attr('x1',x).attr('y1',top+chh).attr('x2',w/2).attr('y2',oy-2));
  svg.append('rect').attr('class','outcome').attr('x',ox).attr('y',oy).attr('width',ow).attr('height',56);
  svg.append('text').attr('class','otext').attr('x',w/2).attr('y',oy+34).text('Both customers unserved');
}
let current=FALLBACK_DATA;
async function load(){try{current=await d3.json('./04-two-customers-fig-04.json');}catch(e){current=FALLBACK_DATA;}draw(current);}
load(); new ResizeObserver(()=>draw(current)).observe(document.getElementById('chart'));
</script></body></html>
