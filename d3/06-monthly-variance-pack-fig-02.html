<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The recipe flow — stops at the gate</title>
<style>
  :root {
    --color-white:     #FFFFFF;
    --color-ink:       #2a1a0e;
    --color-red:       #C8102E;
    --color-secondary: #545454;
    --color-border:    #D4D4D4;
    --color-ochre:     #C8860E;
    --color-fill:      #F5F5F5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-white:     #111111;
      --color-ink:       #F0EBE3;
      --color-red:       #E8243A;
      --color-secondary: #A0978C;
      --color-border:    #2E2E2E;
      --color-ochre:     #D49A30;
      --color-fill:      #1A1A1A;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-white); color: var(--color-ink);
         font-family: 'Inter', -apple-system, 'Helvetica Neue', sans-serif; }
  #chart { width: 100%; }
  .chart-title { font-family:'Inter',sans-serif; font-size:16px; font-weight:700; fill:var(--color-ink); }
  .chart-sub   { font-family:'Inter',sans-serif; font-size:13px; fill:var(--color-secondary); }
  .node-label  { font-family:'Inter',sans-serif; font-size:12px; fill:var(--color-ink); }
  .node-strong { font-family:'Inter',sans-serif; font-size:12px; font-weight:700; fill:var(--color-ink); }
  .gate-label  { font-family:'JetBrains Mono',monospace; font-size:11px; fill:var(--color-red); }
  .zone-label  { font-family:'Inter',sans-serif; font-size:11px; fill:var(--color-secondary); }
  .tooltip { position:absolute; pointer-events:none; opacity:0; background:var(--color-ink);
             color:var(--color-white); font-family:'Inter',sans-serif; font-size:13px;
             padding:6px 10px; border-radius:4px; }
  @media (prefers-reduced-motion: reduce) { * { transition:none !important; animation:none !important; } }
</style>
</head>
<body>
<div id="chart" role="main"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const FALLBACK_DATA = {
  machine: [
    {step:"Ingredients verified", detail:"Source contracts satisfied before any computation"},
    {step:"Compute variances", detail:"Dollar, percent, budget, forecast, prior-period"},
    {step:"Rank by magnitude", detail:"Largest movements first"},
    {step:"Flag by threshold", detail:"Binary: above threshold or not"},
    {step:"Attach prior comments", detail:"Labeled prior; blank where none exists"}
  ],
  human: {label:"Human judgment", items:["Commentary","Release authorization"]}
};

const tooltip = d3.select('body').append('div').attr('class','tooltip');

async function loadData() {
  try { return await d3.json('./06-monthly-variance-pack-fig-02/data.json'); }
  catch { return FALLBACK_DATA; }
}

function draw(data) {
  d3.select('#chart').selectAll('*').remove();
  const totalWidth = document.getElementById('chart').clientWidth || 800;
  const totalHeight = 460;
  const margin = { top: 64, right: 20, bottom: 40, left: 20 };
  const innerW = totalWidth - margin.left - margin.right;

  const svg = d3.select('#chart').append('svg')
    .attr('width',totalWidth).attr('height',totalHeight)
    .attr('role','img').attr('aria-labelledby','t2 d2');
  svg.append('title').attr('id','t2').text('The recipe flow stops at the gate');
  svg.append('desc').attr('id','d2').text('Machine operations run in sequence on the left to a structured work surface, then a vertical gate; only human judgment lies beyond it.');

  svg.append('text').attr('class','chart-title').attr('x',margin.left).attr('y',26)
     .text("The recipe's scope ends at the gate");
  svg.append('text').attr('class','chart-sub').attr('x',margin.left).attr('y',46)
     .text('Nothing crosses without a person.');

  const g = svg.append('g').attr('transform',`translate(${margin.left},${margin.top})`);

  const colMachineW = innerW * 0.32;
  const gateX = innerW * 0.62;
  const nodeH = 40, nodePad = 14;
  const machine = data.machine;

  // machine nodes stacked
  const gm = g.append('g');
  gm.selectAll('.mnode').data(machine).join('rect')
    .attr('class','mnode')
    .attr('x',0).attr('y',(d,i)=>i*(nodeH+nodePad))
    .attr('width',colMachineW).attr('height',nodeH)
    .attr('fill','var(--color-fill)').attr('stroke','var(--color-border)').attr('stroke-width',1)
    .attr('tabindex',0).attr('aria-label',d=>`${d.step}: ${d.detail}`)
    .on('mouseover',function(event,d){
      d3.selectAll('.mnode').attr('opacity',0.35); d3.select(this).attr('opacity',1);
      tooltip.html(`<strong>${d.step}</strong><br>${d.detail}`)
        .style('left',(event.pageX+12)+'px').style('top',(event.pageY-28)+'px')
        .transition().duration(150).style('opacity',1);
    })
    .on('mousemove',event=>tooltip.style('left',(event.pageX+12)+'px').style('top',(event.pageY-28)+'px'))
    .on('mouseout',function(){ d3.selectAll('.mnode').attr('opacity',1); tooltip.transition().duration(100).style('opacity',0); });
  gm.selectAll('.mlabel').data(machine).join('text')
    .attr('class','node-label').attr('x',12).attr('y',(d,i)=>i*(nodeH+nodePad)+nodeH/2+4)
    .text(d=>d.step);
  // connectors
  gm.selectAll('.mconn').data(machine.slice(0,-1)).join('line')
    .attr('class','mconn').attr('aria-hidden','true')
    .attr('x1',colMachineW/2).attr('x2',colMachineW/2)
    .attr('y1',(d,i)=>i*(nodeH+nodePad)+nodeH).attr('y2',(d,i)=>(i+1)*(nodeH+nodePad)-2)
    .attr('stroke','var(--color-secondary)').attr('stroke-width',1.5);

  const stackH = machine.length*(nodeH+nodePad)-nodePad;
  const midY = stackH/2;

  // work surface node
  const wsX = colMachineW + (gateX - colMachineW)*0.18;
  const wsW = (gateX - colMachineW)*0.7;
  g.append('rect').attr('x',wsX).attr('y',midY-36).attr('width',wsW).attr('height',72)
   .attr('fill','var(--color-white)').attr('stroke','var(--color-ink)').attr('stroke-width',1.5);
  g.append('text').attr('class','node-strong').attr('x',wsX+wsW/2).attr('y',midY-6).attr('text-anchor','middle').text('Structured');
  g.append('text').attr('class','node-strong').attr('x',wsX+wsW/2).attr('y',midY+12).attr('text-anchor','middle').text('work surface');
  g.append('line').attr('aria-hidden','true').attr('x1',colMachineW).attr('x2',wsX).attr('y1',midY).attr('y2',midY)
   .attr('stroke','var(--color-secondary)').attr('stroke-width',1.5);

  // gate
  g.append('rect').attr('x',gateX-3).attr('y',-8).attr('width',6).attr('height',stackH+16)
   .attr('fill','var(--color-red)').attr('aria-hidden','true');
  g.append('text').attr('class','gate-label').attr('x',gateX).attr('text-anchor','middle').attr('y',stackH+28).text('gate · stop');
  g.append('line').attr('aria-hidden','true').attr('x1',wsX+wsW).attr('x2',gateX-3).attr('y1',midY).attr('y2',midY)
   .attr('stroke','var(--color-secondary)').attr('stroke-width',1.5);

  // human node
  const hX = gateX + 24, hW = innerW - hX;
  g.append('rect').attr('x',hX).attr('y',midY-54).attr('width',hW).attr('height',108)
   .attr('fill','var(--color-fill)').attr('stroke','var(--color-ink)').attr('stroke-width',1.5);
  g.append('text').attr('class','node-strong').attr('x',hX+hW/2).attr('y',midY-24).attr('text-anchor','middle').text(data.human.label);
  data.human.items.forEach((it,i)=>{
    g.append('text').attr('class','node-label').attr('x',hX+hW/2).attr('y',midY+2+i*22).attr('text-anchor','middle').text(it);
  });
  g.append('line').attr('aria-hidden','true').attr('x1',gateX+3).attr('x2',hX).attr('y1',midY).attr('y2',midY)
   .attr('stroke','var(--color-secondary)').attr('stroke-width',1.5);

  g.append('text').attr('class','zone-label').attr('x',colMachineW/2).attr('y',stackH+28).attr('text-anchor','middle').text('machine operations');
  g.append('text').attr('class','zone-label').attr('x',hX+hW/2).attr('y',midY+62).attr('text-anchor','middle').text('human judgment');
}

loadData().then(data => {
  draw(data);
  const ro = new ResizeObserver(() => draw(data));
  ro.observe(document.getElementById('chart'));
});
</script>
</body>
</html>
