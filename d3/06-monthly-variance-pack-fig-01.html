<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compute vs. explain — the gate</title>
<style>
  :root {
    --color-white:     #FFFFFF;
    --color-ink:       #2a1a0e;
    --color-red:       #C8102E;
    --color-secondary: #545454;
    --color-border:    #D4D4D4;
    --color-ochre:     #C8860E;
    --color-fill:      #F5F5F5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-white:     #111111;
      --color-ink:       #F0EBE3;
      --color-red:       #E8243A;
      --color-secondary: #A0978C;
      --color-border:    #2E2E2E;
      --color-ochre:     #D49A30;
      --color-fill:      #1A1A1A;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-white); color: var(--color-ink);
         font-family: 'Inter', -apple-system, 'Helvetica Neue', sans-serif; }
  #chart { width: 100%; }
  .chart-title { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 700; fill: var(--color-ink); }
  .chart-sub   { font-family: 'Inter', sans-serif; font-size: 13px; fill: var(--color-secondary); }
  .col-head    { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; fill: var(--color-ink); }
  .item-label  { font-family: 'Inter', sans-serif; font-size: 13px; fill: var(--color-ink); }
  .gate-label  { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: var(--color-red); }
  .tooltip { position: absolute; pointer-events: none; opacity: 0;
             background: var(--color-ink); color: var(--color-white);
             font-family: 'Inter', sans-serif; font-size: 13px;
             padding: 6px 10px; border-radius: 4px; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
</style>
</head>
<body>
<div id="chart" role="main"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const FALLBACK_DATA = {
  compute: ["Dollar variance","Percent variance","Rank by magnitude","Flag by threshold","Attach prior comment"],
  explain: ["Causal explanation","Materiality decision","Accounting treatment","Release authorization"]
};

const tooltip = d3.select('body').append('div').attr('class','tooltip');

async function loadData() {
  try { return await d3.json('./06-monthly-variance-pack-fig-01/data.json'); }
  catch { return FALLBACK_DATA; }
}

function draw(data) {
  d3.select('#chart').selectAll('*').remove();
  const totalWidth = document.getElementById('chart').clientWidth || 800;
  const totalHeight = 460;
  const margin = { top: 70, right: 24, bottom: 36, left: 24 };
  const innerW = totalWidth - margin.left - margin.right;
  const gap = 48;
  const colW = (innerW - gap) / 2;
  const rowH = 52, rowPad = 10;

  const svg = d3.select('#chart').append('svg')
    .attr('width', totalWidth).attr('height', totalHeight)
    .attr('role','img').attr('aria-labelledby','t1 d1');
  svg.append('title').attr('id','t1').text('What the machine computes versus what the human explains');
  svg.append('desc').attr('id','d1').text('Two equal columns separated by a vertical gate; the left lists machine computations, the right lists human judgments.');

  svg.append('text').attr('class','chart-title').attr('x',margin.left).attr('y',28)
     .text('A variance is computed by the machine, explained by a person');
  svg.append('text').attr('class','chart-sub').attr('x',margin.left).attr('y',48)
     .text('The gate keeps the two columns separate.');

  const g = svg.append('g').attr('transform',`translate(${margin.left},${margin.top})`);

  function column(items, x0, head, accent) {
    const gg = g.append('g').attr('transform',`translate(${x0},0)`);
    gg.append('text').attr('class','col-head').attr('x',colW/2).attr('y',0)
      .attr('text-anchor','middle').text(head);
    gg.selectAll('.cell').data(items).join('rect')
      .attr('class','cell')
      .attr('x',0).attr('y',(d,i)=>16+i*(rowH+rowPad))
      .attr('width',colW).attr('height',rowH)
      .attr('fill','var(--color-fill)')
      .attr('stroke', accent ? 'var(--color-ink)' : 'var(--color-border)')
      .attr('stroke-width', accent ? 1.5 : 1)
      .attr('tabindex',0)
      .attr('aria-label',d=>`${head}: ${d}`)
      .on('mouseover',function(event,d){
        d3.selectAll('.cell').attr('opacity',0.35);
        d3.select(this).attr('opacity',1);
        tooltip.html(`<strong>${head}</strong><br>${d}`)
          .style('left',(event.pageX+12)+'px').style('top',(event.pageY-28)+'px')
          .transition().duration(150).style('opacity',1);
      })
      .on('mousemove',event=>tooltip.style('left',(event.pageX+12)+'px').style('top',(event.pageY-28)+'px'))
      .on('mouseout',function(){ d3.selectAll('.cell').attr('opacity',1); tooltip.transition().duration(100).style('opacity',0); });
    gg.selectAll('.cell-label').data(items).join('text')
      .attr('class','item-label')
      .attr('x',14).attr('y',(d,i)=>16+i*(rowH+rowPad)+rowH/2+5)
      .text(d=>d);
  }

  column(data.compute, 0, 'What the machine computes', false);
  column(data.explain, colW+gap, 'What the human explains', true);

  const gateX = colW + gap/2;
  g.append('rect').attr('x',gateX-3).attr('y',-8).attr('width',6)
   .attr('height', 16 + Math.max(data.compute.length,data.explain.length)*(rowH+rowPad))
   .attr('fill','var(--color-red)').attr('aria-hidden','true');
  g.append('text').attr('class','gate-label').attr('x',gateX).attr('text-anchor','middle')
   .attr('y', 28 + Math.max(data.compute.length,data.explain.length)*(rowH+rowPad)).text('the gate');
}

loadData().then(data => {
  draw(data);
  const ro = new ResizeObserver(() => draw(data));
  ro.observe(document.getElementById('chart'));
});
</script>
</body>
</html>
