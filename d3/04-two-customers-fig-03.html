<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anatomy of the human report card</title>
<style>
  :root { --color-white:#FFFFFF; --color-ink:#2a1a0e; --color-red:#C8102E; --color-secondary:#545454; --color-border:#D4D4D4; --color-ochre:#C8860E; --color-fill:#F5F5F5; }
  @media (prefers-color-scheme: dark){ :root{ --color-white:#111111; --color-ink:#F0EBE3; --color-red:#E8243A; --color-secondary:#A0978C; --color-border:#2E2E2E; --color-ochre:#D49A30; --color-fill:#1A1A1A; } }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--color-white);color:var(--color-ink);font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;}
  #chart{width:100%;}
  .layer{fill:var(--color-fill);stroke:var(--color-secondary);stroke-width:1;transition:opacity 120ms cubic-bezier(0.2,0.8,0.2,1);}
  .layer.gate{fill:var(--color-red);stroke:var(--color-red);} .layer.gateoutline{fill:var(--color-white);stroke:var(--color-red);stroke-width:2;}
  .heading{font-family:'EB Garamond',Georgia,serif;fill:var(--color-ink);} .sub{fill:var(--color-secondary);}
  .lname{font-weight:700;fill:var(--color-ink);font-size:14px;} .lname.gate{fill:var(--color-white);}
  .ldesc{fill:var(--color-secondary);font-size:12px;} .ldesc.gate{fill:var(--color-white);}
  .mono{font-family:'JetBrains Mono','Fira Code',monospace;font-size:11px;fill:var(--color-secondary);}
  .arrow{stroke:var(--color-ink);stroke-width:2;fill:var(--color-ink);}
  .tooltip{position:absolute;pointer-events:none;opacity:0;background:var(--color-white);color:var(--color-ink);border:1px solid var(--color-border);padding:6px 8px;font-size:13px;max-width:260px;}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important;}}
</style></head>
<body><div id="chart" role="main"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const LAST_GATE=true;
const AXIS_LABEL='legibility';
const FALLBACK_DATA=[{"name":"Purpose","desc":"what was this trying to find?"},{"name":"Evidence summary","desc":"what did it find?"},{"name":"Caveats","desc":"what it did not check"},{"name":"Decisions","desc":"what the human must do"},{"name":"Gate","desc":"who approves, and what it means"}];
let tooltip;
function draw(data){
  d3.select('#chart').selectAll('*').remove();
  if(tooltip)tooltip.remove(); tooltip=d3.select('body').append('div').attr('class','tooltip');
  const w=document.getElementById('chart').clientWidth||700, h=Math.max(400,w*0.6);
  const svg=d3.select('#chart').append('svg').attr('width',w).attr('height',h).attr('viewBox',`0 0 ${w} ${h}`).attr('role','img').attr('aria-labelledby','t d');
  svg.append('title').attr('id','t').text('Anatomy of the human report card');
  svg.append('desc').attr('id','d').text('Five stacked components shown as labeled layers.');
  svg.append('text').attr('class','heading').attr('x',24).attr('y',32).attr('font-size',20).text('Anatomy of the human report card');
  svg.append('text').attr('class','sub').attr('x',24).attr('y',52).attr('font-size',13).text('Five components that make the run legible to an accountable reviewer.');
  const top=80, lx=110, lw=w-lx-30, gap=8, lh=(h-top-30-gap*(data.length-1))/data.length;
  const g=svg.selectAll('.g-layer').data(data).join('g').attr('tabindex',0).attr('role','listitem').attr('aria-label',d=>d.name+': '+d.desc);
  g.append('rect').attr('class',(d,i)=>{ if(i===data.length-1){return LAST_GATE?'layer gate':'layer gateoutline';} return 'layer';})
    .attr('x',lx).attr('y',(d,i)=>top+i*(lh+gap)).attr('width',lw).attr('height',lh);
  g.append('text').attr('class',(d,i)=>'lname'+(i===data.length-1&&LAST_GATE?' gate':'')).attr('x',lx+18).attr('y',(d,i)=>top+i*(lh+gap)+lh/2+5).text(d=>d.name);
  g.append('text').attr('class',(d,i)=>'ldesc'+(i===data.length-1&&LAST_GATE?' gate':'')).attr('x',lx+lw*0.45).attr('y',(d,i)=>top+i*(lh+gap)+lh/2+5).text(d=>d.desc);
  g.on('mouseover',(event,d)=>tooltip.html('<strong>'+d.name+'</strong><br>'+d.desc).style('opacity',1))
   .on('mousemove',event=>tooltip.style('left',(event.pageX+12)+'px').style('top',(event.pageY-28)+'px'))
   .on('mouseout',()=>tooltip.style('opacity',0))
   .on('focus',function(event,d){const rc=this.getBoundingClientRect();tooltip.html('<strong>'+d.name+'</strong><br>'+d.desc).style('opacity',1).style('left',(window.scrollX+rc.left)+'px').style('top',(window.scrollY+rc.bottom+4)+'px');})
   .on('blur',()=>tooltip.style('opacity',0));
  // axis arrow
  svg.append('line').attr('class','arrow').attr('x1',70).attr('y1',h-36).attr('x2',70).attr('y2',top+6);
  svg.append('polygon').attr('class','arrow').attr('points',`70,${top} 65,${top+12} 75,${top+12}`);
  svg.append('text').attr('class','mono').attr('transform',`rotate(-90 44 ${(h+top)/2})`).attr('x',44).attr('y',(h+top)/2).attr('text-anchor','middle').text(AXIS_LABEL);
}
let current=FALLBACK_DATA;
async function load(){try{current=await d3.json('./04-two-customers-fig-03.json');}catch(e){current=FALLBACK_DATA;}draw(current);}
load(); new ResizeObserver(()=>draw(current)).observe(document.getElementById('chart'));
</script></body></html>
