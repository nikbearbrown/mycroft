<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR exception routing to human-action queues</title>
  <style>
    :root {
      --color-white:     #FFFFFF;
      --color-ink:       #2a1a0e;
      --color-red:       #C8102E;
      --color-secondary: #545454;
      --color-border:    #D4D4D4;
      --color-ochre:     #C8860E;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-white:     #111111;
        --color-ink:       #F0EBE3;
        --color-red:       #E8243A;
        --color-secondary: #A0978C;
        --color-border:    #2E2E2E;
        --color-ochre:     #D49A30;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--color-white); color: var(--color-ink); font-family: 'Inter', -apple-system, 'Helvetica Neue', sans-serif; }
    #chart { width: 100%; }
    .chart-title { font-size: 16px; font-weight: 700; fill: var(--color-ink); }
    .chart-subtitle { font-size: 13px; fill: var(--color-secondary); }
    .node-label { font-size: 12px; font-weight: 700; fill: var(--color-ink); }
    .node-sub { font-size: 10px; fill: var(--color-secondary); }
    .source-label { font-size: 12px; font-weight: 700; fill: var(--color-white); }
    .link { stroke: var(--color-secondary); stroke-width: 1.5; fill: none; }
    .tooltip {
      position: absolute; pointer-events: none; opacity: 0;
      background: var(--color-white); color: var(--color-ink);
      border: 1px solid var(--color-border); border-radius: 8px;
      padding: 8px 10px; font-size: 13px; max-width: 220px;
      box-shadow: 0 6px 20px -6px rgb(18 18 18 / 0.14);
    }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
  </style>
</head>
<body>
  <div id="chart" role="main"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <script>
    const FALLBACK_DATA = [
      { label: 'Collections follow-up', sub: 'past-due, no dispute, owner assigned', role: 'Collections owner' },
      { label: 'Dispute resolution',    sub: 'dispute status attached',             role: 'Collections manager' },
      { label: 'Supervisor assignment', sub: 'no owner assigned',                   role: 'Supervisor' },
      { label: 'Data quality',          sub: 'counterparty anomaly detected',       role: 'Data steward' }
    ];

    const tooltip = d3.select('body').append('div').attr('class', 'tooltip');
    function showTip(event, html) {
      tooltip.html(html).style('left', (event.pageX + 12) + 'px').style('top', (event.pageY - 28) + 'px')
        .transition().duration(150).style('opacity', 1);
    }
    function moveTip(event) { tooltip.style('left', (event.pageX + 12) + 'px').style('top', (event.pageY - 28) + 'px'); }
    function hideTip() { tooltip.transition().duration(100).style('opacity', 0); }

    async function loadData() {
      try { return await d3.json('./12-ap-ar-exception-and-aging-workbench-fig-03/data.json'); }
      catch { return FALLBACK_DATA; }
    }

    function draw(data) {
      d3.select('#chart').selectAll('*').remove();
      const totalWidth = document.getElementById('chart').clientWidth || 800;
      const totalHeight = 440;

      const svg = d3.select('#chart').append('svg')
        .attr('width', totalWidth).attr('height', totalHeight)
        .attr('role', 'img').attr('aria-labelledby', 'chart-title chart-desc');
      svg.append('title').attr('id', 'chart-title').text('AR exception routing to human-action queues');
      svg.append('desc').attr('id', 'chart-desc')
        .text('Aging-export exceptions route to four human-action queues; none flow directly to customer communication.');

      svg.append('text').attr('class', 'chart-title').attr('x', 16).attr('y', 26)
        .text('AR exception routing');
      svg.append('text').attr('class', 'chart-subtitle').attr('x', 16).attr('y', 46)
        .text('The workbench routes exceptions; humans decide what happens next.');

      // source node (left)
      const srcX = 24, srcY = 180, srcW = 150, srcH = 80;
      svg.append('rect').attr('x', srcX).attr('y', srcY).attr('width', srcW).attr('height', srcH)
        .attr('rx', 6).attr('fill', 'var(--color-red)');
      svg.append('text').attr('class', 'source-label').attr('x', srcX + srcW / 2).attr('y', srcY + 36)
        .attr('text-anchor', 'middle').text('Aging export');
      svg.append('text').attr('x', srcX + srcW / 2).attr('y', srcY + 54).attr('text-anchor', 'middle')
        .attr('font-size', 11).attr('fill', 'var(--color-white)').text('flagged exceptions');

      const nodeX = totalWidth - 280, nodeW = 256, nodeH = 56;
      const top = 90, gap = 22;
      const ys = data.map((d, i) => top + i * (nodeH + gap));

      // links
      const gLinks = svg.append('g').attr('aria-hidden', 'true');
      ys.forEach(y => {
        const sx = srcX + srcW, sy = srcY + srcH / 2;
        const tx = nodeX, ty = y + nodeH / 2;
        const mx = (sx + tx) / 2;
        gLinks.append('path').attr('class', 'link')
          .attr('d', `M${sx},${sy} C${mx},${sy} ${mx},${ty} ${tx},${ty}`);
      });

      // queue nodes
      const gNodes = svg.append('g').selectAll('.node').data(data).join('g')
        .attr('tabindex', 0).attr('aria-label', d => `${d.label}: ${d.sub}; reviewed by ${d.role}`)
        .style('cursor', 'pointer');
      gNodes.append('rect')
        .attr('x', nodeX).attr('y', (d, i) => ys[i]).attr('width', nodeW).attr('height', nodeH)
        .attr('rx', 6).attr('fill', 'var(--color-white)').attr('stroke', 'var(--color-ink)').attr('stroke-width', 1.5)
        .style('transition', 'opacity 120ms')
        .on('mouseover', function (event, d) { d3.select(this).style('opacity', 0.85); showTip(event, `<strong>${d.label}</strong><br>${d.sub}<br><em>Reviewer: ${d.role}</em>`); })
        .on('mousemove', moveTip)
        .on('mouseout', function () { d3.select(this).style('opacity', 1); hideTip(); });
      gNodes.append('text').attr('class', 'node-label')
        .attr('x', nodeX + 14).attr('y', (d, i) => ys[i] + 24).text(d => d.label);
      gNodes.append('text').attr('class', 'node-sub')
        .attr('x', nodeX + 14).attr('y', (d, i) => ys[i] + 42).text(d => d.sub);

      // boundary note
      svg.append('text').attr('x', nodeX + nodeW / 2).attr('y', totalHeight - 10)
        .attr('text-anchor', 'middle').attr('font-size', 11).attr('fill', 'var(--color-secondary)')
        .text('All queues flow to human action — none to customer communication.');
    }

    loadData().then(data => {
      draw(data);
      const ro = new ResizeObserver(() => draw(data));
      ro.observe(document.getElementById('chart'));
    });
  </script>
</body>
</html>
